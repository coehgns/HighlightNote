spring:
  datasource:
    url: jdbc:h2:mem:highlightnote;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

highlightnote:
  storage:
    upload-directory: ./build/test-storage/uploads
    export-directory: ./build/test-storage/exports
  web:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
