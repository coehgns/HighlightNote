spring:
  datasource:
    url: jdbc:h2:mem:highlightnote;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console
